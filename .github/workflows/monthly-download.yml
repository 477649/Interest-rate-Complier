# .github/workflows/download-interest-rates.yml

name: Download Interest Rate Images

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install playwright requests
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          python download_interest_rates.py

      - name: Upload downloaded images
        uses: actions/upload-artifact@v4
        with:
          name: interest-rate-images
          path: interest_rate_images_latest/
