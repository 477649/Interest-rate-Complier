name: Monthly Interest Rate Image Download

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

jobs:
  download-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages and Playwright browser
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Test website connection
        run: |
          curl -I https://merolagani.com/AnnouncementList.aspx || true

      - name: Run image downloader
        run: |
          python download_images.py

      - name: Upload downloaded images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interest-rate-images
          path: interest_rate_images/
          if-no-files-found: warn
